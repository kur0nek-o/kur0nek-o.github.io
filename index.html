<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>kur0nek-o</title>

    <!-- google font -->
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@100;300;400;600;700&display=swap" rel="stylesheet">

    <style>
        html {
            font-family: 'Inter', sans-serif;
            background-color: #F5F5F5;
        }

        .container {
            width: 100%;
            display: flex;
            justify-content: center;
        }

        header {
            margin-top: 3rem;
            padding: 1rem;
            text-align: center;
        }

        header .img-wrapper {
            margin: auto;
            width: 200px;
            height: 200px;
            cursor: pointer;
            position: relative;
        }

        header .img-wrapper img {
            transition: all ease 0.3s;
        }

        header .img-wrapper img {
            border-radius: 50%;
            width: 100%;
            box-shadow: 0px 5px 10px 0px rgba(0, 0, 0, 0.5);
        }

        header .img-wrapper:hover img {
            transform: translateY(-10px);
            box-shadow: 0px 10px 20px 2px rgba(0, 0, 0, 0.25);
        }

        .text-content {
            max-width: 700px;
        }
    </style>
</head>
<body>
    <div class="container">
        <header>
            <div class="img-wrapper">
                <img 
                    src="./public/img/kawasaki-saki.png" 
                    alt="kawasaki-saki" 
                    title="kawasaki-saki"
                    width="200"
                >
            </div>

            <article class="header-description">
                <h1>kur0nek-o</h1>
                <p class="text-content">Halo, ini personal page punya saya dan link dibawah merupakan projek web kecil yang sedang saya dan teman saya kerjakan, Hehe.</p>
                <a href="#">perjalanan hidoep ft. 2BI</a>
            </article>
        </header>
    </div>
</body>
</html>
